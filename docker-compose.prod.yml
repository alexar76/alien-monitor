# Production Alien Monitor on the AI-Factory host (nginx → /monitor/)
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requires Hub (:9083), Factory API (:9081), Prometheus (:9090) on the host.
# Uses host network so 127.0.0.1 targets work; binds API to 127.0.0.1:9100 only.

services:
  alien-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: ${ALIEN_MONITOR_BASE_PATH:-/monitor/}
    container_name: alien-monitor
    network_mode: host
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      ALIEN_MODE: ${ALIEN_MODE:-real}
      ALIEN_PORT: ${ALIEN_PORT:-9100}
      ALIEN_HOST: ${ALIEN_HOST:-127.0.0.1}
      HUB_URL: ${HUB_URL:-http://127.0.0.1:9083}
      MESH_URL: ${MESH_URL:-http://127.0.0.1:8090}
      AICOM_API_URL: ${AICOM_API_URL:-http://127.0.0.1:9081}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://127.0.0.1:9090}
