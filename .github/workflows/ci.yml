name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      ALIEN_MODE: test
      ALIEN_UNIVERSE_AUTO_START: "0"
      ALIEN_DISABLE_BROADCASTER: "1"
      AICOM_CI_ENFORCE_BADGE_SYNC: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt pytest pytest-timeout

      - name: Pytest + coverage badge
        run: bash scripts/ci_coverage_badge.sh -- tests/ -q --tb=short --maxfail=5 --cov=backend --timeout=60

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
